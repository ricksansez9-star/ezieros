<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZiER OS Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Main Branding Container */
        .portal-box {
            text-align: center;
            border-top: 3px solid #ff0000;
            background: linear-gradient(180deg, rgba(20,20,20,1) 0%, rgba(10,10,10,1) 100%);
            padding: 60px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .os-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            color: #fff;
            text-transform: uppercase;
        }

        .os-subtitle {
            color: #ff0000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Search / Navigation Grid */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .portal-link {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            text-decoration: none;
            color: #ccc;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .portal-link:hover {
            background: #ff0000;
            color: #000;
            border-color: #fff;
            transform: translateY(-5px);
        }

        /* Bottom Status Bar */
        .footer-status {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #444;
            display: flex;
            justify-content: space-around;
        }

        .glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glitch-overlay"></div>

    <div class="portal-box">
        <h1 class="os-title">EZiER OS</h1>
        <p class="os-subtitle">Universal Gateway // POSTAL - PrOSTAL</p>

        <div class="link-grid">
            <a href="https://www.google.com" class="portal-link">Search</a>
            <a href="https://github.com" class="portal-link">Repository</a>
            <a href="https://discord.com" class="portal-link">Network</a>
            <a href="about:blank" class="portal-link">Intranet</a>
        </div>
    </div>

    <div class="footer-status">
        <span>CORE: v2.0.5</span>
        <span>ENCRYPTION: AES-256</span>
        <span>BUILD: POSTAL_ENTERPRISE</span>
    </div>
</body>
</html>
