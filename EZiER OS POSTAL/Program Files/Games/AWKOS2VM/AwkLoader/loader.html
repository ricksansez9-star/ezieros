<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUB 0.97</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --green:     #33ff33;
    --dim:       #1c6b1c;
    --amber:     #ffb000;
    --bg:        #000;
    --scanline:  rgba(0,0,0,0.13);
    --sel-bg:    #33ff33;
    --sel-fg:    #000;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#0d0d0d;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    font-family:'Share Tech Mono', monospace;
  }

  /* ── Add OS button ── */
  #add-os-btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 0.14em;
    text-shadow: 0 0 6px rgba(51,255,51,0.75);
    box-shadow: 0 0 10px rgba(51,255,51,0.18);
    transition: all 0.2s ease;
    z-index: 20;
    text-transform: uppercase;
  }
  #add-os-btn:hover {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(51,255,51,0.6);
  }
  #file-picker { display:none; }

  /* ── Monitor shell ── */
  .monitor {
    width: 860px;
    max-width: 100vw;
    height: 580px;
    max-height: 96vh;
    background: var(--bg);
    border-radius: 6px;
    border: 2px solid #1a1a1a;
    box-shadow:
      0 0 0 5px #141414,
      0 0 0 7px #0a0a0a,
      0 0 70px rgba(51,255,51,0.10),
      inset 0 0 90px rgba(0,0,0,0.85);
    position: relative;
    overflow: hidden;
    padding: 22px 28px 22px;
    outline: none;
  }
  .monitor::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      var(--scanline) 3px, var(--scanline) 4px
    );
    pointer-events:none; z-index:10;
  }
  .monitor::after {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    pointer-events:none; z-index:9;
  }

  .screen {
    width:100%; height:100%;
    color: var(--green);
    font-size: 13.5px;
    line-height: 1.52;
    letter-spacing: 0.03em;
    text-shadow: 0 0 5px rgba(51,255,51,0.75);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .ln { white-space:pre; }
  .ln.dim    { color:var(--dim); text-shadow:none; }
  .ln.amber  { color:var(--amber); text-shadow:0 0 5px rgba(255,176,0,0.7); }
  .ln.bold   { color:#55ff55; }
  .ln.white  { color:#ccc; text-shadow:0 0 3px rgba(200,200,200,0.35); }
  .ln.cyan   { color:#00ffcc; text-shadow:0 0 5px rgba(0,255,204,0.75); }
  .ln.sep    { color:var(--dim); text-shadow:none; }

  #bios-phase { flex-shrink:0; }

  #grub-wrap {
    flex:1;
    display:none;
    flex-direction:column;
    overflow:hidden;
  }
  #grub-wrap.visible { display:flex; }

  #entry-box {
    border:1px solid var(--dim);
    margin:4px 0;
    padding:3px 0;
    overflow-y:auto;
    flex:1;
    scrollbar-width:none;
  }
  #entry-box::-webkit-scrollbar { display:none; }

  .entry {
    white-space:pre;
    padding:0 4px;
    color:var(--dim);
    cursor:default;
    user-select:none;
  }
  .entry.selected {
    background:var(--sel-bg);
    color:var(--sel-fg);
    text-shadow:none;
  }

  #shell-cursor {
    display:inline-block;
    width:8px; height:14px;
    background:var(--green);
    box-shadow:0 0 7px var(--green);
    vertical-align:middle;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .pbar-wrap { display:flex; align-items:center; gap:8px; margin: 4px 0; }
  .pbar-track {
    width:260px; height:9px;
    border:1px solid var(--green);
    box-shadow:0 0 4px rgba(51,255,51,0.35);
    overflow:hidden;
  }
  .pbar-fill {
    height:100%; width:0%;
    background:var(--green);
    box-shadow:0 0 7px var(--green);
  }
  .pbar-pct { color:var(--green); font-size:12px; min-width:34px; }

  #boot-overlay {
    display:none;
    position:absolute; inset:0;
    background:var(--bg);
    z-index:5;
    padding:22px 28px;
    overflow:hidden;
    flex-direction:column;
  }
  #boot-overlay.visible { display:flex; }
  #boot-log {
    flex:1;
    overflow:hidden;
    font-size:13px;
    line-height:1.5;
    color:var(--dim);
    text-shadow:none;
    white-space:pre-wrap;
  }

  #countdown-line { color:var(--amber); text-shadow:0 0 5px rgba(255,176,0,0.7); white-space:pre; }
</style>
</head>
<body>

<button id="add-os-btn" onclick="pickFile()">[ + ADD NEW OS ]</button>
<input type="file" id="file-picker" accept=".html,.htm" onchange="onFilePicked(event)">

<div class="monitor" id="monitor" tabindex="0">
  <div class="screen" id="screen">
    <div id="bios-phase"></div>

    <div id="grub-wrap">
      <div id="grub-header"></div>
      <div id="entry-box"></div>
      <div id="grub-footer"></div>
    </div>

    <div id="boot-overlay">
      <div id="boot-log"></div>
    </div>
  </div>
</div>

<script>
const osEntries = [
  { label: 'AwkOS2', path: '../sys32/AwkTopShell.html' },
];

let selectedIdx   = 0;
let grubActive    = false;
let countdownId   = null;
let countdownSecs = 5;

// FILE PICKER
function pickFile() {
  document.getElementById('file-picker').click();
}

function onFilePicked(e) {
  const file = e.target.files[0];
  if (!file) return;

  const raw   = file.name.replace(/\.(html|htm)$/i, '');
  const label = raw.replace(/[_-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

  // Create a blob URL so the local file can be "booted"
  const path  = URL.createObjectURL(file);

  osEntries.push({ label, path });
  e.target.value = '';

  if (grubActive) {
    selectedIdx = osEntries.length - 1; // Highlight the new OS
    renderEntryBox();
    stopCountdown();
    startCountdown(); // Reset timer to allow user to see the new entry
    document.getElementById('monitor').focus();
  }
}

// HELPERS
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function bLine(text, cls='') {
  const el = document.createElement('div');
  el.className = 'ln' + (cls ? ' '+cls : '');
  el.textContent = text;
  document.getElementById('bios-phase').appendChild(el);
}

function blogLine(text, cls='') {
  const el = document.createElement('div');
  el.className = 'ln' + (cls ? ' '+cls : '');
  el.textContent = text;
  document.getElementById('boot-log').appendChild(el);
}

async function runProgressBar(parentId, durationMs) {
  const wrap  = document.createElement('div'); wrap.className='pbar-wrap';
  const track = document.createElement('div'); track.className='pbar-track';
  const fill  = document.createElement('div'); fill.className='pbar-fill';
  const pct   = document.createElement('span'); pct.className='pbar-pct'; pct.textContent='  0%';
  track.appendChild(fill); wrap.appendChild(track); wrap.appendChild(pct);
  document.getElementById(parentId).appendChild(wrap);

  const steps=80, interval=durationMs/steps;
  for(let i=1; i<=steps; i++) {
    await sleep(interval);
    const p = Math.round((i/steps)*100);
    fill.style.width = p + '%';
    pct.textContent = (p < 10 ? '  ' : p < 100 ? ' ' : '') + p + '%';
  }
  await sleep(100);
  wrap.remove();
}

// GRUB RENDER
const BOX_W = 54;

function padEntry(label, idx) {
  const sel = idx === selectedIdx;
  const prefix = sel ? '▸ ' : '  ';
  const full   = prefix + label;
  return full.padEnd(BOX_W).slice(0, BOX_W);
}

function renderEntryBox() {
  const box = document.getElementById('entry-box');
  box.innerHTML = '';
  osEntries.forEach((e, i) => {
    const el = document.createElement('div');
    el.className = 'entry' + (i === selectedIdx ? ' selected' : '');
    el.textContent = padEntry(e.label, i);
    el.onclick = () => {
      selectedIdx = i;
      stopCountdown();
      renderEntryBox();
    };
    el.ondblclick = () => bootSelected();
    box.appendChild(el);
  });
  const selEl = box.querySelector('.selected');
  if (selEl) selEl.scrollIntoView({ block: 'nearest' });
}

function renderGrubHeader() {
  const hdr = document.getElementById('grub-header');
  hdr.innerHTML = '';
  const lines = [
    { t:'', c:'' },
    { t:' GNU GRUB  version 0.97', c:'cyan' },
    { t:'', c:'' },
    { t:' ┌' + '─'.repeat(BOX_W+2) + '┐', c:'sep' },
    { t:' │' + '  GNU GRUB  version 0.97  Boot Menu  '.padEnd(BOX_W+2).slice(0,BOX_W+2) + '│', c:'amber' },
    { t:' ├' + '─'.repeat(BOX_W+2) + '┤', c:'sep' },
  ];
  lines.forEach(({t,c})=>{
    const d=document.createElement('div');
    d.className='ln'+(c?' '+c:'');
    d.textContent=t; hdr.appendChild(d);
  });
}

function renderGrubFooter() {
  const ftr = document.getElementById('grub-footer');
  ftr.innerHTML = '';
  const lines = [
    { t:' └' + '─'.repeat(BOX_W+2) + '┘', c:'sep' },
    { t:'', c:'' },
    { t:'  Use ↑/↓ to highlight.  ENTER to boot.', c:'dim' },
    { t:'  Click [ + ADD NEW OS ] to inject a custom HTML OS.', c:'dim' },
    { t:'', c:'' },
  ];
  lines.forEach(({t,c})=>{
    const d=document.createElement('div');
    d.className='ln'+(c?' '+c:'');
    d.textContent=t; ftr.appendChild(d);
  });

  const cd = document.createElement('div');
  cd.id = 'countdown-line';
  updateCountdownText(cd, countdownSecs);
  ftr.appendChild(cd);

  const cur = document.createElement('div');
  cur.className='ln';
  cur.innerHTML = '<span id="shell-cursor"></span>';
  ftr.appendChild(cur);
}

function updateCountdownText(el, n) {
  el.textContent = `  Booting '${osEntries[selectedIdx].label}' automatically in ${n} second${n!==1?'s':''}.`;
}

// COUNTDOWN
function startCountdown() {
  countdownSecs = 5;
  const el = document.getElementById('countdown-line');
  if (el) updateCountdownText(el, countdownSecs);

  countdownId = setInterval(() => {
    countdownSecs--;
    const el2 = document.getElementById('countdown-line');
    if (el2) updateCountdownText(el2, countdownSecs);
    if (countdownSecs <= 0) {
      clearInterval(countdownId);
      countdownId = null;
      bootSelected();
    }
  }, 1000);
}

function stopCountdown() {
  if (countdownId) { clearInterval(countdownId); countdownId = null; }
  const el = document.getElementById('countdown-line');
  if (el) el.textContent = '  Countdown stopped. Select OS and press ENTER.';
}

// KEYBOARD HANDLER
document.getElementById('monitor').addEventListener('keydown', e => {
  if (!grubActive) return;
  stopCountdown();

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = (selectedIdx - 1 + osEntries.length) % osEntries.length;
    renderEntryBox();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = (selectedIdx + 1) % osEntries.length;
    renderEntryBox();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    bootSelected();
  }
});

document.getElementById('monitor').addEventListener('click', () => {
  document.getElementById('monitor').focus();
});

// BOOT
async function bootSelected() {
  grubActive = false;
  stopCountdown();

  const entry = osEntries[selectedIdx];
  const overlay = document.getElementById('boot-overlay');
  overlay.classList.add('visible');
  document.getElementById('grub-wrap').style.display = 'none';

  const log = (txt, cls='') => blogLine(txt, cls);

  log(`  Booting '${entry.label}'...`, 'amber');
  log('');
  await sleep(400);

  log('  Loading kernel image ...', 'white');
  await runProgressBar('boot-log', 1200);
  log('  Kernel OK', 'bold');
  await sleep(200);

  log('  Loading initrd ...', 'white');
  await runProgressBar('boot-log', 800);
  log('  Ramdisk OK', 'bold');
  await sleep(300);

  log('');
  log('  Starting system services...', 'white');
  await sleep(500);

  window.location.href = entry.path;
}

// INITIAL BIOS
async function runBios() {
  const b = (t, c='') => bLine(t, c);
  b('');
  b('══════════════════════════════════════════════════════════════', 'sep');
  b('  PHOENIX BIOS v4.0 R6.0    ©1985-2001 Phoenix Technologies', 'amber');
  b('  CPU: Intel Pentium III 866MHz    FPU: Internal', 'bold');
  b('══════════════════════════════════════════════════════════════', 'sep');
  await sleep(400);

  b('');
  b('Memory Test :', 'white');
  await runProgressBar('bios-phase', 1200);
  b('  Memory Test OK  [ 524288 KB ]', 'bold');
  await sleep(300);

  b('  Boot From: Hard Disk', 'amber');
  await sleep(500);

  showGrub();
}

function showGrub() {
  document.getElementById('grub-wrap').classList.add('visible');
  renderGrubHeader();
  renderEntryBox();
  renderGrubFooter();
  grubActive = true;
  document.getElementById('monitor').focus();
  startCountdown();
}

runBios();
</script>
</body>
</html>
