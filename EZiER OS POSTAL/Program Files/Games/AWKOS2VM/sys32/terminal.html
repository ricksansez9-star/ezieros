<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWK Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  :root {
    --bg:       #0c0e0f;
    --bg2:      #111416;
    --surface:  #161a1d;
    --border:   #1f2428;
    --green:    #39d353;
    --cyan:     #58d4e8;
    --yellow:   #e8c339;
    --red:      #e85858;
    --magenta:  #c678dd;
    --white:    #dde1e4;
    --muted:    #4a5568;
    --prompt-u: #39d353;
    --prompt-h: #58d4e8;
    --prompt-p: #e8c339;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: var(--white);
    font-size: 13px;
    overflow: hidden;
  }

  #terminal-wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
  }

  /* Title bar */
  #term-titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }
  .tb-dot {
    width: 12px; height: 12px; border-radius: 50%;
    cursor: pointer; transition: filter 0.15s;
  }
  .tb-dot:hover { filter: brightness(1.4); }
  .tb-dot.close  { background: #e85858; }
  .tb-dot.min    { background: #e8c339; }
  .tb-dot.max    { background: #39d353; }
  #term-title {
    flex: 1; text-align: center; font-size: 12px;
    color: var(--muted); letter-spacing: 1px;
  }
  #term-tabs {
    display: flex; gap: 4px;
  }
  .term-tab {
    font-size: 11px; padding: 3px 10px; border-radius: 4px;
    background: var(--bg2); color: var(--muted);
    cursor: pointer; border: 1px solid var(--border); transition: 0.15s;
  }
  .term-tab.active { background: var(--bg); color: var(--white); border-color: #2d3540; }
  .term-tab:hover:not(.active) { color: var(--white); }

  /* Output area */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px 6px;
    line-height: 1.65;
    scroll-behavior: smooth;
  }
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .line { white-space: pre-wrap; word-break: break-all; min-height: 1em; }
  .line.err  { color: var(--red); }
  .line.info { color: var(--cyan); }
  .line.ok   { color: var(--green); }
  .line.warn { color: var(--yellow); }
  .line.dim  { color: var(--muted); }
  .line.bold { font-weight: 700; }
  .line.header { color: var(--cyan); font-weight: 700; border-bottom: 1px solid var(--border); margin-bottom: 4px; padding-bottom: 2px; }

  /* ANSI-like coloring via spans */
  .c-g  { color: var(--green); }
  .c-c  { color: var(--cyan); }
  .c-y  { color: var(--yellow); }
  .c-r  { color: var(--red); }
  .c-m  { color: var(--magenta); }
  .c-w  { color: var(--white); }
  .c-d  { color: var(--muted); }
  .c-b  { font-weight: 700; }

  /* Prompt line */
  #input-row {
    display: flex; align-items: center;
    padding: 6px 18px 14px;
    gap: 0;
    flex-shrink: 0;
  }
  #prompt-display {
    white-space: nowrap; flex-shrink: 0;
    font-size: 13px; letter-spacing: 0.3px;
  }
  #cmd-input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--white); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; caret-color: var(--green);
    padding: 0 4px;
  }
  #cmd-input::selection { background: #1e3a2a; }

  /* Cursor blink */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: var(--green); vertical-align: middle;
    animation: blink 1s step-end infinite;
    margin-left: 1px;
  }

  /* Scan-line overlay */
  #terminal-wrap::after {
    content: '';
    pointer-events: none;
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* Autocomplete dropdown */
  #autocomplete {
    position: absolute; display: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    z-index: 9999; max-height: 180px; overflow-y: auto; min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .ac-item {
    padding: 4px 12px; cursor: pointer; color: var(--white); white-space: nowrap;
  }
  .ac-item:hover, .ac-item.selected { background: #1e3a2a; color: var(--green); }

  /* Startup animation */
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  .boot-line { animation: fadeIn 0.2s ease both; }
</style>
</head>
<body>
<div id="terminal-wrap" style="position:relative;">

  <div id="autocomplete"></div>
</div>

// ═══════════════════════════════════════════════════════════════
// FS HELPERS
// ═══════════════════════════════════════════════════════════════
function resolvePath(p) {
  if (!p || p === '~') return env.HOME;
  if (p.startsWith('~/')) p = env.HOME + p.slice(1);
  if (!p.startsWith('/')) p = cwd + '/' + p;
  const parts = p.split('/').filter(Boolean);
  const resolved = [];
  for (const part of parts) {
    if (part === '.') continue;
    else if (part === '..') resolved.pop();
    else resolved.push(part);
  }
  return '/' + resolved.join('/');
}

function getNode(path) { return FS[path] || null; }

function getChildren(path) {
  const node = getNode(path);
  if (!node || node.type !== 'dir') return null;
  return node.children || [];
}

function isDir(path) { const n = getNode(path); return n && n.type === 'dir'; }
function isFile(path) { const n = getNode(path); return n && n.type === 'file'; }
function exists(path) { return !!getNode(path); }

function basename(p) { return p.split('/').filter(Boolean).pop() || '/'; }
function dirpart(p) {
  const parts = p.split('/').filter(Boolean);
  parts.pop();
  return '/' + parts.join('/');
}

function formatSize(content) {
  const bytes = content ? content.length : 0;
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'K';
  return (bytes/(1024*1024)).toFixed(1) + 'M';
}

const out = document.getElementById('output');

function println(text = '', cls = '', html = false) {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  if (html) div.innerHTML = text;
  else div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
  return div;
}

function printHTML(html) { println(html, '', true); }

function printPrompt(cmd) {
  const ps = buildPromptText();
  printHTML(`<span class="c-g c-b">${escH(user)}</span><span class="c-d">@</span><span class="c-c">${escH(hostname)}</span><span class="c-d">:</span><span class="c-y">${escH(cwdDisplay())}</span><span class="c-d">$</span> <span class="c-w">${escH(cmd)}</span>`);
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function cwdDisplay() {
  if (cwd === env.HOME) return '~';
  if (cwd.startsWith(env.HOME + '/')) return '~' + cwd.slice(env.HOME.length);
  return cwd;
}

function buildPromptText() {
  return `${user}@${hostname}:${cwdDisplay()}$ `;
}

function updatePromptDisplay() {
  const el = document.getElementById('prompt-display');
  el.innerHTML = `<span class="c-g c-b">${escH(user)}</span><span class="c-d">@</span><span class="c-c">${escH(hostname)}</span><span class="c-d">:</span><span class="c-y">${escH(cwdDisplay())}</span><span class="c-d">$</span>&nbsp;`;
}

    const cleanArgs = [];
    for (const a of args) {
      if (a.startsWith('-')) {
        if (a.includes('a') || a.includes('A')) showHidden = true;
        if (a.includes('l')) longFmt = true;
      } else cleanArgs.push(a);
    }
    if (cleanArgs.length) path = resolvePath(cleanArgs[0]);

    if (!exists(path)) { println(`ls: cannot access '${cleanArgs[0]}': No such file or directory`, 'err'); return; }
    if (isFile(path)) { println(basename(path)); return; }

    const children = getChildren(path);
    let entries = children.map(name => {
      const fullPath = path === '/' ? '/' + name : path + '/' + name;
      const node = getNode(fullPath);
      return { name, fullPath, node };
    });

    if (!showHidden) entries = entries.filter(e => !e.name.startsWith('.'));

    if (longFmt) {
      println(`total ${entries.length * 4}`);
      for (const e of entries) {
        const isD = e.node && e.node.type === 'dir';
        const perm = isD ? 'drwxr-xr-x' : '-rw-r--r--';
        const size = isD ? '4096' : String(e.node?.content?.length || 0).padStart(6);
        const date = 'Apr  1 00:00';
        const nameColored = isD
          ? `<span class="c-c c-b">${escH(e.name)}</span>`
          : `<span class="c-w">${escH(e.name)}</span>`;
        printHTML(`<span class="c-d">${perm}  1 ${user.padEnd(8)} ${user.padEnd(8)} ${size.padStart(6)} ${date} </span>${nameColored}`);
      }
    } else {
      const cols = Math.floor(Math.max(1, (window.innerWidth - 40) / 130));
      let row = '';
      entries.forEach((e, i) => {
        const isD = e.node && e.node.type === 'dir';
        const color = isD ? 'c-c c-b' : 'c-w';
        row += `<span class="${color}" style="display:inline-block;min-width:20ch;margin-right:8px;">${escH(e.name)}</span>`;
        if ((i + 1) % cols === 0) { printHTML(row); row = ''; }
      });
      if (row) printHTML(row);
    }
  },

  // ── File ops ──
  cat: (args) => {
    if (!args.length) { println('cat: missing operand', 'err'); return; }
    for (const a of args) {
      const p = resolvePath(a);
      if (!exists(p)) { println(`cat: ${a}: No such file or directory`, 'err'); continue; }
      if (isDir(p)) { println(`cat: ${a}: Is a directory`, 'err'); continue; }
      const content = getNode(p).content || '';
      for (const line of content.split('\n')) println(line);
    }
  },

  head: (args) => {
    let n = 10; const files = [];
    for (let i=0;i<args.length;i++) {
      if (args[i] === '-n' && args[i+1]) { n = parseInt(args[++i])||10; }
      else if (args[i].startsWith('-') && /^\-\d+$/.test(args[i])) { n = parseInt(args[i].slice(1)); }
      else files.push(args[i]);
    }
    if (!files.length) { println('head: missing file', 'err'); return; }
    for (const f of files) {
      const p = resolvePath(f);
      if (!exists(p)) { println(`head: ${f}: No such file or directory`, 'err'); continue; }
      if (isDir(p)) { println(`head: error reading '${f}': Is a directory`, 'err'); continue; }
      const lines = (getNode(p).content || '').split('\n').slice(0, n);
      lines.forEach(l => println(l));
    }
  },

  tail: (args) => {
    let n = 10; const files = [];
    for (let i=0;i<args.length;i++) {
      if (args[i] === '-n' && args[i+1]) { n = parseInt(args[++i])||10; }
      else if (args[i].startsWith('-') && /^\-\d+$/.test(args[i])) { n = parseInt(args[i].slice(1)); }
      else files.push(args[i]);
    }
    if (!files.length) { println('tail: missing file', 'err'); return; }
    for (const f of files) {
      const p = resolvePath(f);
      if (!exists(p)) { println(`tail: ${f}: No such file or directory`, 'err'); continue; }
      if (isDir(p)) { println(`tail: error reading '${f}': Is a directory`, 'err'); continue; }
      const lines = (getNode(p).content || '').split('\n');
      lines.slice(-n).forEach(l => println(l));
    }
  },

  wc: (args) => {
    const files = args.filter(a => !a.startsWith('-'));
    const opts = args.filter(a => a.startsWith('-'));
    const doLines = !opts.length || opts.some(o => o.includes('l'));
    const doWords = !opts.length || opts.some(o => o.includes('w'));
    const doBytes = !opts.length || opts.some(o => o.includes('c'));
    if (!files.length) { println('wc: missing file', 'err'); return; }
    for (const f of files) {
      const p = resolvePath(f);
      if (!exists(p)) { println(`wc: ${f}: No such file or directory`, 'err'); continue; }
      const c = getNode(p).content || '';
      const lc = c.split('\n').length;
      const wc = c.trim().split(/\s+/).filter(Boolean).length;
      const bc = c.length;
      let out = '';
      if (doLines) out += String(lc).padStart(7);
      if (doWords) out += String(wc).padStart(7);
      if (doBytes) out += String(bc).padStart(7);
      println(`${out} ${f}`);
    }
  },

  grep: (args) => {
    let pattern = '', files = [], ignoreCase = false, lineNum = false, invert = false, count = false;
    const flags = [];
    let i = 0;
    while (i < args.length) {
      if (args[i] === '-i') { ignoreCase = true; i++; }
      else if (args[i] === '-n') { lineNum = true; i++; }
      else if (args[i] === '-v') { invert = true; i++; }
      else if (args[i] === '-c') { count = true; i++; }
      else if (args[i] === '-e' && args[i+1]) { pattern = args[++i]; i++; }
      else if (!pattern) { pattern = args[i++]; }
      else files.push(args[i++]);
    }
    if (!pattern) { println('grep: missing pattern', 'err'); return; }
    const searchIn = files.length ? files : [''];
    for (const f of searchIn) {
      if (!f && !files.length) { println('grep: missing file operand', 'err'); return; }
      const p = resolvePath(f);
      if (!exists(p)) { println(`grep: ${f}: No such file or directory`, 'err'); continue; }
      if (isDir(p)) { println(`grep: ${f}: Is a directory`); continue; }
      const lines = (getNode(p).content || '').split('\n');
      const regex = new RegExp(pattern, ignoreCase ? 'gi' : 'g');
      let matches = 0;
      lines.forEach((line, idx) => {
        const matched = regex.test(line);
        regex.lastIndex = 0;
        if (matched !== invert) {
          matches++;
          if (!count) {
            const prefix = files.length > 1 ? `<span class="c-m">${escH(f)}:</span>` : '';
            const numPrefix = lineNum ? `<span class="c-y">${idx+1}:</span>` : '';
            const hi = line.replace(regex, m => `<span class="c-r c-b">${escH(m)}</span>`);
            regex.lastIndex = 0;
            printHTML(`${prefix}${numPrefix}${hi}`);
          }
        }
      });
      if (count) println(String(matches));
    }
  },

  find: (args) => {
    let startPath = '.', nameFilter = null, typeFilter = null;
    for (let i=0;i<args.length;i++) {
      if (args[i] === '-name' && args[i+1]) { nameFilter = args[++i]; }
      else if (args[i] === '-type' && args[i+1]) { typeFilter = args[++i]; }
      else if (!args[i].startsWith('-')) { startPath = args[i]; }
    }
    const base = resolvePath(startPath);
    if (!exists(base)) { println(`find: '${startPath}': No such file or directory`, 'err'); return; }

    function walk(path) {
      const node = getNode(path);
      if (!node) return;
      const name = basename(path);
      const matchName = !nameFilter || matchGlob(name, nameFilter);
      const matchType = !typeFilter || (typeFilter === 'd' ? node.type === 'dir' : node.type === 'file');
      if (matchName && matchType) println(path);
      if (node.type === 'dir' && node.children) {
        for (const child of node.children) {
          walk(path === '/' ? '/' + child : path + '/' + child);
        }
      }
    }
    walk(base);
  },

  mkdir: (args) => {
    if (!args.length) { println('mkdir: missing operand', 'err'); return; }
    const parents = args.includes('-p');
    const dirs = args.filter(a => !a.startsWith('-'));
    for (const d of dirs) {
      const p = resolvePath(d);
      if (exists(p)) { if (!parents) println(`mkdir: cannot create directory '${d}': File exists`, 'err'); continue; }
      const parent = dirpart(p);
      if (!exists(parent)) { println(`mkdir: cannot create directory '${d}': No such file or directory`, 'err'); continue; }
      FS[p] = { type: 'dir', children: [] };
      const parentNode = getNode(parent);
      if (parentNode && parentNode.children) parentNode.children.push(basename(p));
      println('', 'ok');
    }
  },

  touch: (args) => {
    if (!args.length) { println('touch: missing file operand', 'err'); return; }
    for (const f of args) {
      const p = resolvePath(f);
      if (!exists(p)) {
        const parent = dirpart(p);
        if (!exists(parent)) { println(`touch: cannot touch '${f}': No such file or directory`, 'err'); continue; }
        FS[p] = { type: 'file', content: '' };
        const parentNode = getNode(parent);
        if (parentNode && parentNode.children) parentNode.children.push(basename(p));
      }
    }
  },

  rm: (args) => {
    const recursive = args.some(a => a.includes('r') || a.includes('R'));
    const force = args.some(a => a.includes('f'));
    const files = args.filter(a => !a.startsWith('-'));
    if (!files.length) { println('rm: missing operand', 'err'); return; }
    for (const f of files) {
      const p = resolvePath(f);
      if (!exists(p)) { if (!force) println(`rm: cannot remove '${f}': No such file or directory`, 'err'); continue; }
      if (isDir(p) && !recursive) { println(`rm: cannot remove '${f}': Is a directory`, 'err'); continue; }
      // Remove from parent
      const parent = dirpart(p);
      const parentNode = getNode(parent);
      if (parentNode && parentNode.children) {
        parentNode.children = parentNode.children.filter(c => c !== basename(p));
      }
      delete FS[p];
    }
  },

  cp: (args) => {
    const files = args.filter(a => !a.startsWith('-'));
    if (files.length < 2) { println('cp: missing destination file operand', 'err'); return; }
    const dest = resolvePath(files[files.length - 1]);
    const srcs = files.slice(0, -1);
    for (const s of srcs) {
      const sp = resolvePath(s);
      if (!exists(sp)) { println(`cp: cannot stat '${s}': No such file or directory`, 'err'); continue; }
      if (isDir(sp)) { println(`cp: -r not specified; omitting directory '${s}'`, 'err'); continue; }
      let dp = dest;
      if (isDir(dest)) dp = dest + '/' + basename(sp);
      const parentOfDp = dirpart(dp);
      if (!exists(parentOfDp)) { println(`cp: cannot create regular file '${dp}': No such file or directory`, 'err'); continue; }
      FS[dp] = { type: 'file', content: getNode(sp).content };
      const parentNode = getNode(parentOfDp);
      if (parentNode && parentNode.children && !parentNode.children.includes(basename(dp))) {
        parentNode.children.push(basename(dp));
      }
    }
  },

  mv: (args) => {
    const files = args.filter(a => !a.startsWith('-'));
    if (files.length < 2) { println('mv: missing destination file operand', 'err'); return; }
    const dest = resolvePath(files[files.length - 1]);
    const srcs = files.slice(0, -1);
    for (const s of srcs) {
      const sp = resolvePath(s);
      if (!exists(sp)) { println(`mv: cannot stat '${s}': No such file or directory`, 'err'); continue; }
      let dp = dest;
      if (isDir(dest)) dp = dest + '/' + basename(sp);
      const parentOfDp = dirpart(dp);
      if (!exists(parentOfDp)) { println(`mv: cannot move '${s}' to '${dp}': No such file or directory`, 'err'); continue; }
      FS[dp] = FS[sp];
      delete FS[sp];
      const oldParent = getNode(dirpart(sp));
      if (oldParent && oldParent.children) oldParent.children = oldParent.children.filter(c => c !== basename(sp));
      const newParent = getNode(parentOfDp);
      if (newParent && newParent.children && !newParent.children.includes(basename(dp))) newParent.children.push(basename(dp));
    }
  },

  // ── Write to file ──
  write: (args) => {
    if (args.length < 2) { println('write: usage: write <file> <content...>', 'err'); return; }
    const p = resolvePath(args[0]);
    const content = args.slice(1).join(' ');
    if (!exists(p)) {
      const parent = dirpart(p);
      if (!exists(parent)) { println(`write: cannot create '${args[0]}': No such file or directory`, 'err'); return; }
      const parentNode = getNode(parent);
      if (parentNode && parentNode.children) parentNode.children.push(basename(p));
    }
    FS[p] = { type: 'file', content };
    println(`'${args[0]}' written.`, 'ok');
  },

    println(`    ${months[month]} ${year}`, 'info');

    const days = new Date(year, month+1, 0).getDate();

  sort: (args) => {
    const files = args.filter(a=>!a.startsWith('-'));
    const reverse = args.includes('-r');
    const numeric = args.includes('-n');
    const unique = args.includes('-u');
    if (!files.length) { println('sort: missing file', 'err'); return; }
    for (const f of files) {
      const p = resolvePath(f);
      if (!exists(p)) { println(`sort: ${f}: No such file or directory`, 'err'); continue; }
      let lines = (getNode(p).content||'').split('\n');
      if (unique) lines = [...new Set(lines)];
      lines.sort(numeric ? (a,b) => parseFloat(a)-parseFloat(b) : (a,b) => a.localeCompare(b));
      if (reverse) lines.reverse();
      lines.forEach(l => println(l));
    }
  },

  uniq: (args) => {
    const files = args.filter(a=>!a.startsWith('-'));
    const count = args.includes('-c');
    if (!files.length) { println('uniq: missing file', 'err'); return; }
    const p = resolvePath(files[0]);
    if (!exists(p)) { println(`uniq: ${files[0]}: No such file or directory`, 'err'); return; }
    const lines = (getNode(p).content||'').split('\n');
    let prev = null, cnt = 0;
    for (let i=0;i<lines.length;i++) {
      if (lines[i] === prev) { cnt++; }
      else {
        if (prev !== null) println(count ? `${String(cnt).padStart(6)} ${prev}` : prev);
        prev = lines[i]; cnt = 1;
      }
    }
    if (prev !== null) println(count ? `${String(cnt).padStart(6)} ${prev}` : prev);
  },

// ═══════════════════════════════════════════════════════════════
// COMMAND RUNNER
// ═══════════════════════════════════════════════════════════════
function matchGlob(name, pattern) {
  const re = new RegExp('^' + pattern.replace(/\./g, '\\.').replace(/\*/g, '.*').replace(/\?/g, '.') + '$');
  return re.test(name);
}

function tokenize(input) {
  // Simple tokenizer: handle quotes
  const tokens = [];
  let cur = '', inQ = false, qChar = '';
  for (let i=0;i<input.length;i++) {
    const c = input[i];
    if (inQ) {
      if (c === qChar) inQ = false;
      else cur += c;
    } else if (c === '"' || c === "'") { inQ = true; qChar = c; }
    else if (c === ' ' || c === '\t') { if (cur) { tokens.push(cur); cur=''; } }
    else cur += c;
  }
  if (cur) tokens.push(cur);
  return tokens;
}

function runCommand(input) {
  input = input.trim();
  if (!input) return;

  // Handle alias expansion
  const tokens = tokenize(input);
  if (!tokens.length) return;
  let cmd = tokens[0];
  const args = tokens.slice(1);

  if (aliases[cmd]) {
    const expanded = tokenize(aliases[cmd]);
    cmd = expanded[0];
    args.unshift(...expanded.slice(1));
  }

  if (COMMANDS[cmd]) {
    try { COMMANDS[cmd](args); }
    catch(e) { println(`${cmd}: internal error — ${e.message}`, 'err'); }
  } else {
    // Try to run if it's a file path
    const p = resolvePath(cmd);
    if (exists(p) && isFile(p)) {
      println(`[executing ${cmd}...]`, 'dim');
      const content = getNode(p).content || '';
      for (const line of content.split('\n')) {
        if (line.startsWith('#') || !line.trim()) continue;
        println(`+ ${line}`, 'dim');
      }
      println(`[${cmd}: exited 0]`, 'ok');
    } else {
      println(`${cmd}: command not found`, 'err');
      println(`  Type 'help' for available commands.`, 'dim');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// INPUT / AUTOCOMPLETE
// ═══════════════════════════════════════════════════════════════
const input = document.getElementById('cmd-input');
const acBox = document.getElementById('autocomplete');
let acItems = [], acIdx = -1;

function getCompletions(partial) {
  const tokens = tokenize(partial);
  const completingCmd = tokens.length <= 1 && !partial.endsWith(' ');

  if (completingCmd) {
    // Complete command names
    const prefix = tokens[0] || '';
    return [...Object.keys(COMMANDS), ...Object.keys(aliases)]
      .filter(c => c.startsWith(prefix)).sort();
  } else {
    // Complete paths
    const lastToken = partial.endsWith(' ') ? '' : tokens[tokens.length - 1];
    const pathPrefix = lastToken;
    const dir = pathPrefix.includes('/')
      ? resolvePath(pathPrefix.endsWith('/') ? pathPrefix : pathPrefix.split('/').slice(0,-1).join('/') || '/')
      : cwd;
    const namePrefix = pathPrefix.includes('/')
      ? (pathPrefix.endsWith('/') ? '' : pathPrefix.split('/').pop())
      : pathPrefix;

    const children = getChildren(dir) || [];
    return children
      .filter(c => c.startsWith(namePrefix))
      .map(c => {
        const full = (pathPrefix.includes('/') ? (pathPrefix.endsWith('/') ? pathPrefix : pathPrefix.split('/').slice(0,-1).join('/')+'/') : '') + c;
        const fp = resolvePath(full);
        return isDir(fp) ? c + '/' : c;
      });
  }
}

function hideAC() {
  acBox.style.display = 'none';
  acItems = []; acIdx = -1;
}

function showAC(completions, partial) {
  if (!completions.length) { hideAC(); return; }
  acBox.innerHTML = '';
  acItems = completions;
  acIdx = -1;
  completions.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.textContent = c;
    div.onmouseover = () => { acIdx = i; highlightAC(); };
    div.onclick = () => { applyCompletion(c, partial); hideAC(); };
    acBox.appendChild(div);
  });
  const rect = input.getBoundingClientRect();
  acBox.style.display = 'block';
  acBox.style.left = rect.left + 'px';
  acBox.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
}

function highlightAC() {
  document.querySelectorAll('.ac-item').forEach((el, i) => {
    el.classList.toggle('selected', i === acIdx);
  });
}

function applyCompletion(completion, partial) {
  const tokens = tokenize(input.value);
  const endsWithSpace = input.value.endsWith(' ');
  const completingCmd = tokens.length <= 1 && !endsWithSpace;

  if (completingCmd) {
    input.value = completion + ' ';
  } else {
    const lastToken = endsWithSpace ? '' : tokens[tokens.length - 1];
    const base = input.value.slice(0, input.value.length - lastToken.length);
    input.value = base + completion;
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const completions = getCompletions(input.value);
    if (acItems.length && acBox.style.display !== 'none') {
      acIdx = (acIdx + 1) % acItems.length;
      highlightAC();
      applyCompletion(acItems[acIdx], input.value);
    } else {
      if (completions.length === 1) {
        applyCompletion(completions[0], input.value);
        hideAC();
      } else {
        showAC(completions, input.value);
      }
    }
    return;
  }

  if (e.key === 'Enter') {
    const cmd = input.value;
    hideAC();
    if (cmd.trim()) {
      printPrompt(cmd);
      if (history[history.length-1] !== cmd) history.push(cmd);
      histIdx = history.length;
      runCommand(cmd);
    }
    input.value = '';
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (acItems.length && acBox.style.display !== 'none') {
      acIdx = (acIdx - 1 + acItems.length) % acItems.length;
      highlightAC();
      applyCompletion(acItems[acIdx], input.value);
    } else {
      if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (acItems.length && acBox.style.display !== 'none') {
      acIdx = (acIdx + 1) % acItems.length;
      highlightAC();
      applyCompletion(acItems[acIdx], input.value);
    } else {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
      else { histIdx = history.length; input.value = ''; }
    }
    return;
  }

  if (e.key === 'Escape') { hideAC(); return; }

  if (e.ctrlKey) {
    if (e.key === 'l' || e.key === 'L') { e.preventDefault(); COMMANDS.clear([]); return; }
    if (e.key === 'c') { println('^C', 'err'); input.value = ''; hideAC(); return; }
    if (e.key === 'a') { e.preventDefault(); input.setSelectionRange(0,0); return; }
    if (e.key === 'e') { e.preventDefault(); input.setSelectionRange(input.value.length, input.value.length); return; }
    if (e.key === 'u') { e.preventDefault(); input.value = ''; hideAC(); return; }
    if (e.key === 'k') { e.preventDefault(); input.value = input.value.slice(0, input.selectionStart); return; }
    if (e.key === 'w') {
      e.preventDefault();
      const v = input.value.slice(0, input.selectionStart);
      const newV = v.replace(/\S+\s*$/, '');
      input.value = newV + input.value.slice(input.selectionStart);
      input.setSelectionRange(newV.length, newV.length);
      return;
    }
  }

  // Hide AC on other keys
  setTimeout(() => {
    if (acBox.style.display !== 'none') hideAC();
  }, 0);
});

document.addEventListener('click', e => {
  if (!acBox.contains(e.target)) hideAC();
});

// Keep focus
document.addEventListener('click', () => input.focus());

function boot() {
  updatePromptDisplay();
  const bootLines = [
    { text: 'AWK OS 2 — Terminal Emulator v2.0', cls: 'info bold' },
    { text: '──────────────────────────────────', cls: 'dim' },
    { text: 'Kernel: Linux 6.5.0-awkos  Arch: x86_64', cls: 'dim' },
    { text: `Session: ${user}@${hostname}  Shell: bash 5.2.0`, cls: 'dim' },
    { text: '', cls: '' },
    { text: 'Type "help" for available commands.', cls: 'ok' },
    { text: 'Type "man <command>" for detailed usage.', cls: 'ok' },
    { text: '', cls: '' },
  ];
  let delay = 0;
  for (const l of bootLines) {
    setTimeout(() => {
      const el = println(l.text, l.cls);
      el.classList.add('boot-line');
      el.style.animationDelay = '0ms';
    }, delay);
    delay += 40;
  }
  setTimeout(() => {
