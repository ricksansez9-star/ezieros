<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern HTML Calculator (Dark Mode)</title>
<style>
  /* Dark mode color scheme variables */
  :root {
    --bg-color: #1a1a1a;
    --calc-bg: #2c2c2c;
    --display-bg: #1a1a1a;
    --text-color: #f0f0f0;
    --btn-gray: #505050;
    --btn-orange: #ff9f0a;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: var(--bg-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .calculator {
    width: 320px;
    background-color: var(--calc-bg);
    padding: 20px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); /* Darker shadow for dark mode */
  }

  #display {
    width: 100%;
    height: 80px;
    font-size: 2.5rem;
    text-align: right;
    border: none;
    background: var(--display-bg); /* Use a darker background for the display */
    color: var(--text-color);
    margin-bottom: 20px;
    outline: none;
    padding: 0 10px;
    border-radius: 10px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  button {
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 1.5rem;
    font-weight: 500;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s;
    background-color: var(--btn-gray);
    color: white; /* Changed text color to white for better visibility */
  }

  button:active {
    transform: scale(0.95);
  }

  button:hover {
    filter: brightness(1.2); /* Brighten on hover for dark buttons */
  }

  .operator {
    background-color: var(--btn-orange);
    color: white;
  }

  .double {
    grid-column: span 2;
    border-radius: 35px;
    text-align: left;
    padding-left: 25px; /* Adjust padding for the '0' button */
  }

  .clear {
    background-color: #a5a5a5;
    color: black;
  }
</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" disabled value="0">
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">AC</button>
    <button onclick="deleteLast()">DEL</button>
    <button class="operator" onclick="appendToDisplay('/')">÷</button>
    <button class="operator" onclick="appendToDisplay('*')">×</button>
    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('9')">9</button>
    <button class="operator" onclick="appendToDisplay('-')">−</button>
    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('6')">6</button>
    <button class="operator" onclick="appendToDisplay('+')">+</button>
    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('3')">3</button>
    <button class="operator" onclick="calculate()">=</button>
    <button class="double" onclick="appendToDisplay('0')">0</button>
    <button onclick="appendToDisplay('.')">.</button>
  </div>
</div>

<script>
  const display = document.getElementById('display');

  function appendToDisplay(input) {
    if (display.value === "0" || display.value === "Error") {
      display.value = input;
    } else {
      display.value += input;
    }
  }

  function clearDisplay() {
    display.value = "0";
  }

  function deleteLast() {
    display.value = display.value.slice(0, -1);
    if (display.value === "") display.value = "0";
  }

  function calculate() {
    try {
      // Using Function() instead of eval() for slightly better security
      display.value = Function('"use strict";return (' + display.value + ')')();
    } catch (error) {
      display.value = "Error";
    }
  }

  // Keyboard support
  document.addEventListener('keydown', (event) => {
    const key = event.key;
    if (/[0-9]/.test(key)) appendToDisplay(key);
    if (['+', '-', '*', '/'].includes(key)) appendToDisplay(key);
    if (key === 'Enter' || key === '=') calculate();
    if (key === 'Backspace') deleteLast();
    if (key === 'Escape') clearDisplay();
  });
</script>

</body>
</html>
