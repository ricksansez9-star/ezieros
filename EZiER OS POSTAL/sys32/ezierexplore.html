<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; padding: 20px; }
        .file { padding: 10px; border: 1px solid #333; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3>EZiER Explore</h3>
    <div id="file-list"></div>

    <script>
        const FS_KEY = 'ezier_fs';
        const list = document.getElementById('file-list');

        function render() {
            list.innerHTML = '';
            const fs = JSON.parse(localStorage.getItem(FS_KEY) || '{}');
            Object.keys(fs).forEach(name => {
                const div = document.createElement('div');
                div.className = 'file';
                div.innerText = `📄 ${name}`;
                list.appendChild(div);
            });
        }

        // Listen for updates from the Terminal
        window.addEventListener('storage', render);
        render(); // Initial load
    </script>
</body>
</html>
